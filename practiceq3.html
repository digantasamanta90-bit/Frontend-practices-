<!-- Create three buttons & set its background color to:
 1.green using css stylesheet
 2.blue using <style> tag
 3.pink using inline tag -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="practiceq3.css">
    <style>
        .button2{
            background-color: blue
        }
    </style>
 </head>
 <body>
    <button class="button1">Button 1</button>
    <button class="button2">Button 2</button>
    <button class="button3" style="background-color: pink;">Button 2</button>
 </body>
 </html>
